name: korabo-forum-worker.yml
on:
  push:
    branches:
      - master
    paths:
      - packages/korabo-forum-worker/**
      - packages/forum-core/**

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/korabo-forum-worker

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-region: ap-southeast-1
          role-session-name: LambdaDeploymentSession
          role-to-assume: arn:aws:iam::975050100357:role/lambda_deployer

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ${{ github.workspace }}/target/
          key: ${{ runner.os }}-cargo-korabo-forum-worker-${{ hashFiles('packages/korabo-forum-worker/Cargo.toml', 'packages/forum-core/Cargo.toml', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-korabo-forum-worker-

      - name: Install cargo-lambda (if not cached)
        run: |
          if ! command -v cargo-lambda &> /dev/null; then
          pip install cargo-lambda
          fi

      - name: Build and deploy lambda
        run: |
          cargo lambda build --release
          cargo lambda deploy korabo-forum-worker
    
